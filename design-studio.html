<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڈیزائن اسٹوڈیو — ASK REAL ESTATE</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/realtors.css">
</head>
<body class="fr-site" data-page="design-studio.html">
    <div id="fr-layout"></div>
    <section class="fr-page-hero fr-page-hero-img" style="background-image:linear-gradient(rgba(26,43,74,0.85),rgba(15,26,46,0.9)),url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=1400&auto=format&fit=crop&q=80')">
        <h1>ڈیزائن اسٹوڈیو</h1>
        <p>انterior، فنشنگ اور گھر کی سجاوٹ</p>
    </section>
    <div class="fr-page-body">
        <div class="fr-studio-grid">
            <div class="fr-studio-card">
                <div class="fr-studio-img"><img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=600&auto=format&fit=crop&q=80" alt="انterior" loading="lazy"></div>
                <div class="fr-studio-text">
                    <h3>انterior ڈیزائن</h3>
                    <p>مکان اور فلیٹ کی اندرونی سجاوٹ — جدید اور روایتی انداز۔</p>
                </div>
            </div>
            <div class="fr-studio-card">
                <div class="fr-studio-img"><img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=600&auto=format&fit=crop&q=80" alt="فنشنگ" loading="lazy"></div>
                <div class="fr-studio-text">
                    <h3>فنشنگ</h3>
                    <p>فرنیچر، پینٹ اور فلورنگ — مکمل پیکج۔</p>
                </div>
            </div>
            <div class="fr-studio-card">
                <div class="fr-studio-img"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&auto=format&fit=crop&q=80" alt="لینڈ scaping" loading="lazy"></div>
                <div class="fr-studio-text">
                    <h3>لینڈ scaping</h3>
                    <p>باغ، lawns اور بیرونی خوبصورتی۔</p>
                </div>
            </div>
            <div class="fr-studio-card">
                <div class="fr-studio-img"><img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=600&auto=format&fit=crop&q=80" alt="3D پلان" loading="lazy"></div>
                <div class="fr-studio-text">
                    <h3>3D پلان</h3>
                    <p>تعمیر سے پہلے 3D ماڈل اور بجٹ تخمینہ۔</p>
                </div>
            </div>
        </div>
        <p style="text-align:center;margin-top:2rem">
            <a class='fr-cta-btn' href='/#contact'>مفت مشاورت — رابطہ کریں</a>
        </p>
    </div>
    <div id="fr-footer-slot"></div>
    <script src="js/pwa.js"></script>
    <script src="js/core.js"></script>
    <script src="js/zameen.js"></script>
    <script src="js/fr-layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => FrLayout.initCommon());
    </script>

</html>
