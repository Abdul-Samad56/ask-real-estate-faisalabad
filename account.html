<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میرا اکاؤنٹ — ASK REAL ESTATE FAISALABAD</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="css/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/realtors.css">
    <link rel="stylesheet" href="css/zameen.css">
</head>
<body class="fr-site" data-page="account.html">
    <div id="fr-layout"></div>

    <section class="fr-page-hero">
        <h1>میرا اکاؤنٹ</h1>
        <p class="fr-bi-sub">آپ کی درج کردہ پراپرٹیز</p>
    </section>

    <div class="fr-page-body fr-account-page">
        <div id="accountLoginGate" class="fr-auth-gate" hidden>
            <h3>اکاؤنٹ دیکھنے کے لیے لاگ ان کریں</h3>
            <a href="login.html?redirect=account.html" class="fr-form-submit fr-login-again-btn">لاگ ان کریں</a>
        </div>

        <div id="accountContent" hidden>
            <div class="fr-account-header" id="accountUserInfo"></div>
            <div class="fr-account-actions">
                <a href="list-property.html" class="fr-btn-list">+ نئی پراپرٹی درج کریں</a>
                <button type="button" class="fr-auth-btn fr-auth-logout" id="accountLogout">لاگ آؤٹ</button>
            </div>
            <h3 class="fr-section-heading-bi">
                <span>میری درج کردہ پراپرٹیز</span>
                <span id="accountCount" class="fr-account-count"></span>
            </h3>
            <p class="fr-account-note">یہاں وہ تمام پراپرٹیز ہیں جو آپ نے لاگ ان کر کے درج کی ہیں — مکمل ریکارڈ اور حذف کا اختیار</p>
            <div id="accountSubmissions" class="fr-account-list"></div>
        </div>
    </div>

    <div id="fr-footer-slot"></div>

    <script src="js/pwa.js"></script>
    <script src="js/site-config.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/security.js"></script>
    <script src="js/zameen.js"></script>
    <script src="js/fr-layout.js"></script>
    <script type="module" src="js/cloud-auth.js"></script>
    <script src="js/local-db.js"></script>
    <script src="js/owner-auth.js"></script>
    <script src="js/account-page.js"></script>
</body>
</html>
