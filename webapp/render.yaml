services:
  - type: web
    name: ask-real-estate
    runtime: node
    rootDir: .
    buildCommand: npm --prefix client install && npm --prefix client run build && npm --prefix server install
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        value: abdulsamadkhattak5@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: حافظ عبدالصمد خٹک
      - key: ADMIN_PHONE
        value: "03215315603"
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
