<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لاگ ان / رجسٹر — ASK REAL ESTATE FAISALABAD</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/realtors.css">
</head>
<body class="fr-site fr-auth-page" data-page="login.html">
    <div id="fr-layout"></div>

    <div class="fr-auth-wrap">
        <div class="fr-auth-card">
            <h1>لاگ ان</h1>

            <div id="authSetupNotice" class="fr-auth-setup" hidden>
                <strong>⚠ Supabase کنفیگر نہیں</strong>
                <p>site-config.js میں <code>supabase.url</code> اور <code>supabase.anonKey</code> لگائیں، پھر <code>enabled: true</code> کریں۔</p>
            </div>

            <div id="authButtons" class="fr-auth-buttons">
                <button type="button" class="fr-auth-btn fr-auth-google" id="btnGoogle">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google سے لاگ ان
                </button>
                <button type="button" class="fr-auth-btn fr-auth-facebook" id="btnFacebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook سے لاگ ان
                </button>
            </div>

            <div id="authLocalSection" class="fr-auth-local-wrap" hidden>
                <div class="fr-auth-choice">
                    <button type="button" class="fr-auth-choice-btn active" data-login-tab="login">لاگ ان</button>
                    <button type="button" class="fr-auth-choice-btn" data-login-tab="register">نیا اکاؤنٹ بنائیں</button>
                </div>
                <form id="loginLocalForm" class="fr-auth-local-form">
                    <label>Gmail / Email <input type="email" id="loginLocalEmail" required autocomplete="email"></label>
                    <label>پاس ورڈ <input type="password" id="loginLocalPassword" required minlength="6"></label>
                    <button type="submit" class="fr-auth-btn fr-auth-primary">Submit</button>
                </form>
                <form id="registerLocalForm" class="fr-auth-local-form" hidden>
                    <label>نام <input type="text" id="registerLocalName" required autocomplete="name"></label>
                    <label>Gmail / Email <input type="email" id="registerLocalEmail" required autocomplete="email"></label>
                    <label>فون نمبر <input type="tel" id="registerLocalPhone" autocomplete="tel"></label>
                    <label>پاس ورڈ <input type="password" id="registerLocalPassword" required minlength="6" autocomplete="new-password"></label>
                    <button type="submit" class="fr-auth-btn fr-auth-primary">نیا اکاؤنٹ بنائیں</button>
                </form>
            </div>

            <p id="authError" class="fr-auth-error hidden"></p>
        </div>
    </div>

    <div id="fr-footer-slot"></div>

    <script src="js/pwa.js"></script>
    <script src="js/site-config.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/security.js"></script>
    <script src="js/fr-layout.js"></script>
    <script type="module" src="js/cloud-auth.js"></script>
    <script src="js/local-db.js"></script>
    <script src="js/owner-auth.js"></script>
    <script type="module">
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || 'account.html';

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            FrLayout.initCommon();
            await OwnerAuth.waitReady();

            if (OwnerAuth.isLoggedIn()) {
                location.replace(redirect);
                return;
            }

            const cloud = OwnerAuth.usesCloud();
            document.getElementById('authSetupNotice').hidden = cloud || OwnerAuth.usesLocalDb();
            document.getElementById('authLocalSection').hidden = cloud;
            document.getElementById('authButtons').hidden = !cloud;
            if (!cloud) {
                document.getElementById('authButtons').querySelectorAll('button').forEach((b) => (b.disabled = true));
            }

            document.querySelectorAll('[data-login-tab]').forEach((tab) => {
                tab.addEventListener('click', () => {
                    const mode = tab.getAttribute('data-login-tab');
                    document.querySelectorAll('[data-login-tab]').forEach((t) => t.classList.toggle('active', t === tab));
                    document.getElementById('loginLocalForm').toggleAttribute('hidden', mode !== 'login');
                    document.getElementById('registerLocalForm').toggleAttribute('hidden', mode !== 'register');
                });
            });

            document.getElementById('loginLocalForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await OwnerAuth.loginLocal(
                        document.getElementById('loginLocalEmail').value,
                        document.getElementById('loginLocalPassword').value
                    );
                    location.replace(redirect);
                } catch (err) {
                    showError(err.message);
                }
            });

            document.getElementById('registerLocalForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await OwnerAuth.registerLocal({
                        email: document.getElementById('registerLocalEmail').value,
                        password: document.getElementById('registerLocalPassword').value,
                        fullName: document.getElementById('registerLocalName').value,
                        phone: document.getElementById('registerLocalPhone').value,
                    });
                    location.replace(redirect);
                } catch (err) {
                    showError(err.message);
                }
            });

            if (!cloud) return;

            document.getElementById('btnGoogle').addEventListener('click', async () => {
                try {
                    await OwnerAuth.signInWithProvider('google', redirect);
                } catch (e) {
                    showError(e.message || 'Google لاگ ان ناکام');
                }
            });

            document.getElementById('btnFacebook').addEventListener('click', async () => {
                try {
                    await OwnerAuth.signInWithProvider('facebook', redirect);
                } catch (e) {
                    showError(e.message || 'Facebook لاگ ان ناکام');
                }
            });
        });
    </script>
</body>
</html>
