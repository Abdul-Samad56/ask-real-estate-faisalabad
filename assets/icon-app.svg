<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e6bb8"/>
      <stop offset="50%" stop-color="#0d3b7a"/>
      <stop offset="100%" stop-color="#071f3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="45%" stop-color="#f0c14b"/>
      <stop offset="100%" stop-color="#c99220"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="420" cy="80" r="150" fill="#64b5f6" opacity="0.28"/>
  <circle cx="70" cy="450" r="130" fill="#000" opacity="0.28"/>

  <!-- Solid house silhouette (no confusing cutouts) -->
  <path d="M256 95
           L400 220
           L355 220
           L355 330
           L157 330
           L157 220
           L112 220
           Z"
        fill="url(#gold)"
        stroke="#fff8dc"
        stroke-width="8"
        stroke-linejoin="round"/>

  <!-- Door as darker gold rectangle -->
  <rect x="228" y="250" width="56" height="80" rx="6" fill="#8a6410"/>

  <text x="256" y="410" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="96" font-weight="700" fill="#ffffff" letter-spacing="4">ASK</text>

  <text x="256" y="455" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="26" font-weight="700" fill="#ffe9a8" letter-spacing="6">REAL ESTATE</text>
</svg>
